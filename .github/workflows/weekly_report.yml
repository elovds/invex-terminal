name: Weekly portfolio report

on:
  schedule:
    - cron: '0 7 * * 1'   # Cada dilluns a les 7:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch market data
        run: python fetch_data.py

      - name: Run portfolio analysis
        run: python analyze.py

      - name: Send weekly report email
        run: python send_report.py --mode weekly
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json analysis.json
          git diff --cached --quiet || \
            git commit -m "data: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
